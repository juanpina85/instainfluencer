<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaInfluencer AI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI','Helvetica Neue',sans-serif; background: #07080f; color: #e0e4ff; min-height: 100vh; }
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 5px; background: #0c0d1a; }
::-webkit-scrollbar-thumb { background: #1e2240; border-radius: 10px; }
header { background: linear-gradient(135deg,#1a0533,#3b0a1e 50%,#0f1a3b); padding: 18px 28px; border-bottom: 1px solid #1a1d38; }
.header-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; gap:14px; }
.logo-icon { font-size:32px; filter:drop-shadow(0 0 10px #f43f5e88); }
.logo-title { font-size:21px; font-weight:900; background:linear-gradient(90deg,#a78bfa,#f87171); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.logo-sub { font-size:10px; color:#444; letter-spacing:1.2px; text-transform:uppercase; margin-top:1px; }
.container { max-width:1200px; margin:0 auto; padding:24px 18px; }
.section-label { font-size:10px; font-weight:800; letter-spacing:1.3px; text-transform:uppercase; color:#333; margin-bottom:11px; }
.regions { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
.region-btn { background:#0a0b18; border:2px solid #1a1d38; border-radius:13px; padding:13px 10px; cursor:pointer; text-align:center; transition:all .2s; }
.region-btn:hover { border-color:#7c3aed55; }
.region-btn.active { background:#120828; border-color:#7c3aed; transform:translateY(-2px); box-shadow:0 4px 18px #7c3aed1a; }
.region-flag { font-size:26px; }
.region-name { font-size:12px; font-weight:700; color:#7080b0; margin-top:5px; }
.region-btn.active .region-name { color:#c4b5fd; }
.region-sub { font-size:10px; color:#333; margin-top:2px; }
.actions { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
.btn-main { background:linear-gradient(135deg,#7c3aed,#f43f5e); border:none; border-radius:12px; color:#fff; font-size:14px; font-weight:800; padding:13px 24px; cursor:pointer; display:flex; align-items:center; gap:9px; box-shadow:0 4px 18px #f43f5e28; }
.btn-main:disabled { background:#151728; color:#555; box-shadow:none; cursor:not-allowed; }
.btn-clear { background:#0a0b18; border:1px solid #1a1d38; border-radius:12px; color:#555; font-size:13px; font-weight:600; padding:13px 18px; cursor:pointer; }
.status-bar { display:none; background:#0a0b18; border:1px solid #1a1d38; border-radius:10px; padding:11px 16px; font-size:12px; color:#666; align-items:center; gap:9px; margin-bottom:22px; }
.status-bar.show { display:flex; }
.status-bar.error { border-color:#ef444428; color:#ef4444; }
.status-bar.retrying { border-color:#f59e0b28; color:#f59e0b; }
.spin { width:14px; height:14px; border:2px solid #1a1d38; border-top-color:#a78bfa; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }

/* Trend cards — full width */
.trends-list { display:flex; flex-direction:column; gap:16px; }
.trend-card { background:#0a0b18; border:1px solid #1a1d38; border-radius:16px; overflow:hidden; }
.trend-top { display:grid; grid-template-columns:auto 1fr 1fr; gap:0; }
.trend-info { padding:16px; border-right:1px solid #1a1d38; }
.trend-content { padding:16px; border-right:1px solid #1a1d38; }
.trend-reel { padding:16px; }
.trend-row { display:flex; gap:11px; align-items:flex-start; }
.trend-num { min-width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,#7c3aed,#f43f5e); color:#fff; font-size:11px; font-weight:900; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.trend-title { font-size:14px; font-weight:700; color:#dde4ff; line-height:1.4; }
.trend-desc { font-size:11px; color:#555; margin-top:4px; }
.trend-tag { display:inline-block; margin-top:7px; font-size:10px; font-weight:700; border-radius:20px; padding:2px 9px; }
.col-label { font-size:10px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; color:#f43f5e; margin-bottom:8px; }
.ctext { background:#07080f; border:1px solid #1a1d38; border-radius:8px; padding:10px 12px; font-size:12px; color:#c0c8f0; line-height:1.6; white-space:pre-wrap; max-height:160px; overflow-y:auto; }
.copy-btn { margin-top:6px; background:none; border:1px solid #252840; border-radius:7px; color:#555; font-size:10px; padding:3px 10px; cursor:pointer; }
.copy-btn:hover { color:#a78bfa; border-color:#a78bfa; }

/* Reel generation */
.btn-reel { background:linear-gradient(135deg,#7c3aed,#f43f5e); border:none; border-radius:9px; color:#fff; font-size:12px; font-weight:700; padding:8px 16px; cursor:pointer; width:100%; margin-bottom:8px; }
.btn-reel:disabled { background:#1a1d38; color:#444; cursor:not-allowed; }
.reel-step { display:flex; align-items:center; gap:7px; font-size:11px; color:#666; padding:4px 0; }
.reel-step.done { color:#22c55e; }
.reel-step.active { color:#a78bfa; }
.reel-step.err { color:#ef4444; }
.prog-bg { background:#1a1d38; border-radius:20px; height:4px; margin:8px 0; }
.prog-fill { background:linear-gradient(90deg,#7c3aed,#f43f5e); height:100%; border-radius:20px; transition:width .6s; }
.video-wrap video { width:100%; border-radius:10px; max-height:220px; background:#000; display:block; margin-bottom:8px; }
.btn-dl { display:block; background:linear-gradient(135deg,#7c3aed,#f43f5e); border-radius:9px; color:#fff; font-size:12px; font-weight:700; padding:8px 14px; text-decoration:none; text-align:center; }

.empty { text-align:center; color:#2a2d48; padding:48px 0; font-size:13px; }
.empty-icon { font-size:34px; margin-bottom:10px; }

@media(max-width:900px){ .trend-top{grid-template-columns:1fr;} .trend-info,.trend-content{border-right:none;border-bottom:1px solid #1a1d38;} }
@media(max-width:600px){ .regions{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <span class="logo-icon">📱</span>
    <div>
      <div class="logo-title">InstaInfluencer AI</div>
      <div class="logo-sub">Noticias → Guión → Voz OpenAI → Video Runway → Reel</div>
    </div>
  </div>
</header>

<div class="container">
  <div class="section-label">Región</div>
  <div class="regions">
    <div class="region-btn active" onclick="selectRegion('Argentina',this)">
      <div class="region-flag">🇦🇷</div><div class="region-name">Argentina</div><div class="region-sub">Buenos Aires</div>
    </div>
    <div class="region-btn" onclick="selectRegion('Estados Unidos',this)">
      <div class="region-flag">🇺🇸</div><div class="region-name">Estados Unidos</div><div class="region-sub">New York / LA</div>
    </div>
    <div class="region-btn" onclick="selectRegion('China',this)">
      <div class="region-flag">🇨🇳</div><div class="region-name">China</div><div class="region-sub">Beijing / Shanghai</div>
    </div>
    <div class="region-btn" onclick="selectRegion('Europa y Medio Oriente',this)">
      <div class="region-flag">🌍</div><div class="region-name">Europa & Medio Oriente</div><div class="region-sub">Londres / Dubai</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-main" id="mainBtn" onclick="run()">✨ Buscar tendencias y generar contenido</button>
    <button class="btn-clear" onclick="clearAll()">🗑 Limpiar</button>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="spin" id="statusSpin" style="display:none"></div>
    <span id="statusText"></span>
  </div>

  <div id="trendsPanel">
    <div class="empty"><div class="empty-icon">🌎</div>Seleccioná región y presioná el botón</div>
  </div>
</div>

<script>
const PROXY = "https://runway-proxy-production.up.railway.app";
const TAG_COLORS = { Política:"#ef4444", Tech:"#3b82f6", Deporte:"#22c55e", Economía:"#f59e0b", Cultura:"#a855f7", Internacional:"#06b6d4", default:"#6366f1" };
const sleep = ms => new Promise(r => setTimeout(r, ms));

let currentRegion = "Argentina", payload = null;

function selectRegion(name, el) {
  document.querySelectorAll(".region-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  currentRegion = name;
}

function setStatus(msg, loading=true, type="") {
  const bar = document.getElementById("statusBar");
  bar.className = "status-bar show" + (type ? " "+type : "");
  document.getElementById("statusSpin").style.display = loading ? "block" : "none";
  document.getElementById("statusText").textContent = msg;
}
function hideStatus() { document.getElementById("statusBar").className = "status-bar"; }

function extractJSON(raw) {
  if (!raw) return null;
  try { return JSON.parse(raw.trim()); } catch {}
  const f = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (f) { try { return JSON.parse(f[1].trim()); } catch {} }
  const s = raw.indexOf("{"), e = raw.lastIndexOf("}");
  if (s !== -1 && e !== -1) { try { return JSON.parse(raw.slice(s, e+1)); } catch {} }
  return null;
}

async function callClaude(prompt) {
  for (let attempt = 0; attempt <= 4; attempt++) {
    if (attempt > 0) {
      const w = Math.pow(2, attempt-1) * 2;
      setStatus(`⏳ Rate limit — esperando ${w}s... (intento ${attempt+1}/5)`, true, "retrying");
      await sleep(w * 1000 + Math.random() * 600);
      setStatus(`🔄 Reintentando (${attempt+1}/5)...`);
    }
    const res = await fetch(`${PROXY}/api/claude`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 3000,
        system: "Devolvés ÚNICAMENTE JSON puro y válido. Sin backticks, sin texto extra.",
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }],
      }),
    });
    if (res.status === 429) { if (attempt === 4) throw new Error("Rate limit. Esperá unos minutos."); continue; }
    if (!res.ok) { const b = await res.json().catch(()=>({})); throw new Error(`Claude ${res.status}: ${b.error?.message||"error"}`); }
    const data = await res.json();
    return data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
  }
}

async function run() {
  const btn = document.getElementById("mainBtn");
  btn.disabled = true;
  payload = null;
  document.getElementById("trendsPanel").innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>Buscando noticias...</div>';

  const today = new Date().toLocaleDateString("es-AR", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
  const prompt = `Hoy es ${today}. Buscá en internet las 5 noticias más importantes y virales de HOY en: ${currentRegion}.

Para CADA noticia generá contenido completo para un Reel de Instagram.

Respondé ÚNICAMENTE con este JSON (sin backticks):
{
  "trends": [
    {
      "title": "título corto",
      "desc": "descripción 1 oración",
      "tag": "Política|Tech|Deporte|Economía|Cultura|Internacional",
      "source": "medio",
      "hook": "gancho primeros 3 segundos del reel, español argentino informal, intrigante",
      "script": "guión completo del reel 30-45 seg para ser narrado en voz en off:\\n[INTRO]: ...\\n[DESARROLLO]: ...\\n[CTA]: ...",
      "caption": "caption IG max 100 palabras, español argentino informal, con emojis",
      "hashtags": ["tag1","tag2","tag3","tag4","tag5","tag6","tag7","tag8","tag9","tag10"],
      "video_prompt": "Cinematic 9:16 vertical Runway Gen-4.5 prompt in English, no text on screen, documentary news style, dramatic lighting, specific to this news story"
    }
  ]
}
Generá exactamente 5 objetos en el array trends, uno por noticia.`;

  try {
    setStatus("🔍 Buscando noticias y generando contenido...");
    const raw = await callClaude(prompt);
    const parsed = extractJSON(raw);
    if (!parsed?.trends?.length) throw new Error("Respuesta inválida. Intentá de nuevo.");
    payload = parsed;
    renderTrends(parsed.trends);
    setStatus(`✅ Listo — ${new Date().toLocaleTimeString("es-AR")}`, false);
    setTimeout(hideStatus, 3000);
  } catch(e) {
    setStatus("❌ " + e.message, false, "error");
    document.getElementById("trendsPanel").innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`;
  }
  btn.disabled = false;
}

function renderTrends(trends) {
  document.getElementById("trendsPanel").innerHTML = `<div class="trends-list">${trends.map((t,i) => {
    const c = TAG_COLORS[t.tag] || TAG_COLORS.default;
    const hashStr = (t.hashtags||[]).map(h=>"#"+h.replace(/^#/,"")).join(" ");
    return `<div class="trend-card">
      <div class="trend-top">
        <!-- COL 1: Noticia -->
        <div class="trend-info">
          <div class="trend-row">
            <div class="trend-num">${i+1}</div>
            <div>
              <div class="trend-title">${t.title}</div>
              ${t.desc?`<div class="trend-desc">${t.desc}</div>`:""}
              <span class="trend-tag" style="background:${c}20;color:${c};border:1px solid ${c}44">${t.tag}</span>
              ${t.source?`<div style="font-size:10px;color:#444;margin-top:4px">📰 ${t.source}</div>`:""}
            </div>
          </div>
        </div>

        <!-- COL 2: Contenido -->
        <div class="trend-content">
          <div style="margin-bottom:12px">
            <div class="col-label">⚡ Hook</div>
            <div class="ctext" style="max-height:60px">${t.hook||""}</div>
          </div>
          <div style="margin-bottom:12px">
            <div class="col-label">🎬 Guión del Reel</div>
            <div class="ctext">${t.script||""}</div>
            <button class="copy-btn" onclick="cp(this,\`${esc(t.script)}\`)">📋 Copiar guión</button>
          </div>
          <div style="margin-bottom:12px">
            <div class="col-label">📝 Caption</div>
            <div class="ctext" style="max-height:80px">${t.caption||""}</div>
            <button class="copy-btn" onclick="cp(this,\`${esc(t.caption)}\`)">📋 Copiar caption</button>
          </div>
          <div>
            <div class="col-label">🏷️ Hashtags</div>
            <div class="ctext" style="max-height:50px;font-size:11px;color:#c084fc">${hashStr}</div>
            <button class="copy-btn" onclick="cp(this,\`${esc(hashStr)}\`)">📋 Copiar hashtags</button>
          </div>
        </div>

        <!-- COL 3: Generar Reel -->
        <div class="trend-reel">
          <div class="col-label">🎥 Reel con Voz</div>
          <button class="btn-reel" id="btn-reel-${i}" onclick="generateReel(${i})">
            🎬 Generar Reel + Voz
          </button>
          <div id="reel-status-${i}"></div>
          <div id="reel-result-${i}"></div>
        </div>
      </div>
    </div>`;
  }).join("")}</div>`;
}

// ── Generar Reel + Voz + Merge ────────────────────────────
async function generateReel(idx) {
  const trend = payload?.trends?.[idx];
  if (!trend) return;

  const btn    = document.getElementById(`btn-reel-${idx}`);
  const status = document.getElementById(`reel-status-${idx}`);
  const result = document.getElementById(`reel-result-${idx}`);

  btn.disabled = true;
  result.innerHTML = "";

  const step = (icon, msg, state="active") => {
    status.innerHTML += `<div class="reel-step ${state}">${icon} ${msg}</div>`;
  };
  const setStep = (html) => { status.innerHTML = html; };
  const prog = (pct) => {
    const pb = document.getElementById(`prog-${idx}`);
    if (pb) pb.style.width = pct + "%";
  };

  status.innerHTML = `<div class="prog-bg"><div class="prog-fill" id="prog-${idx}" style="width:5%"></div></div>`;

  try {
    // PASO 1 — Generar audio TTS
    step("🔊", "Generando voz en off...");
    prog(10);
    const ttsRes = await fetch(`${PROXY}/api/tts`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      // Limpiar el guión — sacar encabezados tipo [INTRO]: etc
  const scriptClean = (trend.script || "")
  .replace(/guión completo del reel[^:\n]*:/gi, "")
  .replace(/\[INTRO\]:/gi, "")
  .replace(/\[DESARROLLO\]:/gi, "")
  .replace(/\[CTA\]:/gi, "")
  .trim();

body: JSON.stringify({ text: scriptClean }),
    });
    if (!ttsRes.ok) {
      const e = await ttsRes.json().catch(()=>({}));
      throw new Error("TTS: " + (e.error || ttsRes.status));
    }
    const audioBuffer = await ttsRes.arrayBuffer();
const audioBytes = new Uint8Array(audioBuffer);
let binary = "";
for (let i = 0; i < audioBytes.length; i++) binary += String.fromCharCode(audioBytes[i]);
const audioBase64 = btoa(binary);
    step("✅", "Voz generada", "done");
    prog(25);

    // PASO 2 — Crear tarea de video en Runway
    step("🎬", "Enviando a Runway...");
    prog(30);
    const runRes = await fetch(`${PROXY}/api/runway/generate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: trend.video_prompt }),
    });
    if (!runRes.ok) {
      const e = await runRes.json().catch(()=>({}));
      throw new Error("Runway: " + (e.error || runRes.status));
    }
    const { taskId } = await runRes.json();
    step("✅", "Tarea de video creada", "done");
    prog(35);

    // PASO 3 — Polling Runway
    step("⏳", "Generando video (~1-2 min)...");
    let videoUrl = null;
    for (let i = 0; i < 72; i++) {
      await sleep(5000);
      const pr = await fetch(`${PROXY}/api/runway/status/${taskId}`);
      if (!pr.ok) throw new Error(`Poll ${pr.status}`);
      const d = await pr.json();
      prog(35 + Math.min(35, Math.round((i/72)*35)));
      if (d.status === "SUCCEEDED") { videoUrl = d.url; break; }
      if (d.status === "FAILED") throw new Error("Video fallido en Runway: " + (d.failure||""));
    }
    if (!videoUrl) throw new Error("Timeout esperando el video");
    step("✅", "Video generado", "done");
    prog(75);

    // PASO 4 — Merge video + audio
    step("🔀", "Combinando video + voz...");
    prog(80);
    const mergeRes = await fetch(`${PROXY}/api/merge`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ videoUrl, audioBase64 }),
    });
    if (!mergeRes.ok) {
      const e = await mergeRes.json().catch(()=>({}));
      throw new Error("Merge: " + (e.error || mergeRes.status));
    }
    const reelBlob = await mergeRes.blob();
    const reelUrl  = URL.createObjectURL(reelBlob);
    step("✅", "¡Reel listo!", "done");
    prog(100);

    result.innerHTML = `<div class="video-wrap" style="margin-top:10px">
      <video src="${reelUrl}" controls playsinline></video>
      <a class="btn-dl" href="${reelUrl}" download="reel-tendencia-${idx+1}.mp4">⬇️ Descargar Reel</a>
    </div>`;

  } catch(e) {
    status.innerHTML += `<div class="reel-step err">❌ ${e.message}</div>`;
    btn.disabled = false;
    btn.textContent = "🔄 Reintentar";
    btn.onclick = () => generateReel(idx);
  }
}

function cp(btn, text) {
  navigator.clipboard.writeText(text).then(()=>{ btn.textContent="✅ Copiado"; setTimeout(()=>btn.textContent=btn.textContent.includes("guión")?"📋 Copiar guión":btn.textContent.includes("caption")?"📋 Copiar caption":btn.textContent.includes("hashtag")?"📋 Copiar hashtags":"📋 Copiar",2000); });
}
function esc(s){ return (s||"").replace(/\\/g,"\\\\").replace(/`/g,"\\`").replace(/\$/g,"\\$"); }
function clearAll(){
  payload=null;
  document.getElementById("trendsPanel").innerHTML='<div class="empty"><div class="empty-icon">🌎</div>Seleccioná región y presioná el botón</div>';
  hideStatus();
}
</script>
</body>
</html>
